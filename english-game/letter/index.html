<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Smart Letter Learner A-Z</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
	<link
		href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700&family=Lora:wght@500;700&display=swap"
		rel="stylesheet">
	<style>
		body {
			font-family: 'Fredoka One', cursive;
			background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
			touch-action: manipulation;
			overflow-x: hidden;
		}

		/* Serif font for English letters to help with recognition */
		.serif-font {
			font-family: 'Lora', serif;
		}

		.hebrew-text {
			font-family: 'Heebo', sans-serif;
			direction: rtl;
		}

		.card {
			transition: transform 0.2s, box-shadow 0.2s;
		}

		.card:active {
			transform: scale(0.95);
		}

		.correct-anim {
			animation: bounce 0.5s ease;
			background-color: #4ade80 !important;
			color: white !important;
		}

		.wrong-anim {
			animation: shake 0.5s ease;
			background-color: #f87171 !important;
			color: white !important;
		}

		@keyframes bounce {

			0%,
			100% {
				transform: translateY(0);
			}

			50% {
				transform: translateY(-20px);
			}
		}

		@keyframes shake {

			0%,
			100% {
				transform: translateX(0);
			}

			25% {
				transform: translateX(-10px);
			}

			75% {
				transform: translateX(10px);
			}
		}

		.celebrate-text {
			animation: pulse 1s infinite;
		}

		@keyframes pulse {

			0%,
			100% {
				transform: scale(1);
			}

			50% {
				transform: scale(1.1);
			}
		}

		.no-scrollbar::-webkit-scrollbar {
			display: none;
		}

		.no-scrollbar {
			-ms-overflow-style: none;
			scrollbar-width: none;
		}
	</style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4">

	<!-- Settings Modal -->
	<div id="settings-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
		<div class="bg-white rounded-3xl w-full max-w-lg max-h-[90vh] flex flex-col shadow-2xl overflow-hidden">
			<div class="p-6 border-b flex justify-between items-center bg-indigo-50">
				<h2 class="text-xl text-indigo-700">Choose Letters</h2>
				<button onclick="toggleModal()"
					class="text-gray-500 hover:text-red-500 text-3xl font-sans">&times;</button>
			</div>
			<div class="p-4 border-b flex items-center justify-between px-6">
				<span class="text-gray-700 font-sans font-bold text-sm">Keyboard Mode</span>
				<label class="relative inline-flex items-center cursor-pointer">
					<input type="checkbox" id="keyboard-toggle" class="sr-only peer" onchange="keyboardMode = this.checked">
					<div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:bg-indigo-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
				</label>
			</div>
			<div class="p-4 overflow-y-auto grid grid-cols-3 sm:grid-cols-4 gap-2 no-scrollbar"
				id="letter-selector-grid">
				<!-- Selection buttons injected here -->
			</div>
			<div class="p-6 border-t flex gap-2">
				<button onclick="selectAll(true)" class="flex-1 bg-gray-200 py-2 rounded-xl text-sm">Select All</button>
				<button onclick="selectAll(false)" class="flex-1 bg-gray-200 py-2 rounded-xl text-sm">Clear All</button>
				<button onclick="saveAndClose()"
					class="flex-1 bg-indigo-600 text-white py-2 rounded-xl font-bold">Start!</button>
			</div>
		</div>
	</div>

	<!-- Stats Modal -->
	<div id="stats-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
		<div class="bg-white rounded-3xl w-full max-w-lg max-h-[90vh] flex flex-col shadow-2xl overflow-hidden">
			<div class="p-6 border-b flex justify-between items-center bg-emerald-50">
				<h2 class="text-xl text-emerald-700">Letter Statistics</h2>
				<button onclick="toggleStatsModal()"
					class="text-gray-500 hover:text-red-500 text-3xl font-sans">&times;</button>
			</div>
			<div class="p-4 overflow-y-auto no-scrollbar" id="stats-content">
			</div>
		</div>
	</div>

	<!-- Main Game UI -->
	<div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-6 border-4 border-indigo-400 relative z-10">
		<div class="flex justify-between items-center mb-6">
			<div class="flex gap-2">
				<button onclick="toggleModal()"
					class="bg-indigo-100 text-indigo-600 p-2 rounded-xl hover:bg-indigo-200 transition-colors">
					<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
						stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
							d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
							d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
					</svg>
				</button>
				<button onclick="toggleStatsModal()"
					class="bg-emerald-100 text-emerald-600 p-2 rounded-xl hover:bg-emerald-200 transition-colors">
					<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
						stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
							d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
					</svg>
				</button>
			</div>
			<div id="score-container"
				class="bg-yellow-400 text-white px-5 py-2 rounded-full shadow-md text-lg min-w-[110px] text-center transition-all duration-500">
				<span id="score">0</span>
			</div>
		</div>

		<div id="mode-text"
			class="text-center text-gray-400 text-sm mb-2 uppercase tracking-widest font-sans font-bold">
			Loading...
		</div>

		<div class="text-center mb-8">
			<div id="target-display"
				class="text-8xl text-indigo-600 drop-shadow-lg min-h-[140px] flex items-center justify-center"></div>
		</div>

		<div id="options-container" class="grid grid-cols-2 gap-3"></div>

		<div id="feedback" class="mt-6 text-center text-xl h-6 opacity-0 transition-opacity duration-300 font-bold">
			Great Job! 🌟
		</div>
	</div>

	<script>
		const allLetters = [
			{ id: 0, char: 'A a', hebrew: 'אֵי', weight: 10, active: true, successes: 0, failures: 0 },
			{ id: 1, char: 'B b', hebrew: 'בִּי', weight: 10, active: true, successes: 0, failures: 0 },
			{ id: 2, char: 'C c', hebrew: 'סִי', weight: 10, active: true, successes: 0, failures: 0 },
			{ id: 3, char: 'D d', hebrew: 'דִּי', weight: 10, active: true, successes: 0, failures: 0 },
			{ id: 4, char: 'E e', hebrew: 'אִ', weight: 10, active: true, successes: 0, failures: 0 },
			{ id: 5, char: 'F f', hebrew: 'אֶף', weight: 10, active: true, successes: 0, failures: 0 },
			{ id: 6, char: 'G g', hebrew: 'גִ׳', weight: 10, active: true, successes: 0, failures: 0 },
			{ id: 7, char: 'H h', hebrew: 'אֵישׁ', weight: 10, active: true, successes: 0, failures: 0 },
			{ id: 8, char: 'I i', hebrew: 'אָי', weight: 10, active: true, successes: 0, failures: 0 },
			{ id: 9, char: 'J j', hebrew: 'גֵ׳י', weight: 10, active: true, successes: 0, failures: 0 },
			{ id: 10, char: 'K k', hebrew: 'כֵּי', weight: 10, active: true, successes: 0, failures: 0 },
			{ id: 11, char: 'L l', hebrew: 'אֶל', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 12, char: 'M m', hebrew: 'אֶם', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 13, char: 'N n', hebrew: 'אֶן', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 14, char: 'O o', hebrew: 'אוֹ', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 15, char: 'P p', hebrew: 'פִּי', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 16, char: 'Q q', hebrew: 'קְיוּ', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 17, char: 'R r', hebrew: 'אָר', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 18, char: 'S s', hebrew: 'אֶס', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 19, char: 'T t', hebrew: 'טִי', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 20, char: 'U u', hebrew: 'יוּ', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 21, char: 'V v', hebrew: 'וִי', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 22, char: 'W w', hebrew: 'דַּאבֶּלְיוּ', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 23, char: 'X x', hebrew: 'אֶקְס', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 24, char: 'Y y', hebrew: 'אוּאָי', weight: 10, active: false, successes: 0, failures: 0 },
			{ id: 25, char: 'Z z', hebrew: 'זִי', weight: 10, active: false, successes: 0, failures: 0 }
		];

		let score = 0;
		let currentLetter = null;
		let isProcessing = false;
		let gameMode = 'L_TO_H';
		let hasCelebrated = false;
		let keyboardMode = false;

		const scoreEl = document.getElementById('score');
		const scoreContainer = document.getElementById('score-container');
		const targetEl = document.getElementById('target-display');
		const optionsEl = document.getElementById('options-container');
		const feedbackEl = document.getElementById('feedback');
		const modeTextEl = document.getElementById('mode-text');
		const modal = document.getElementById('settings-modal');
		const selectorGrid = document.getElementById('letter-selector-grid');

		function setupSelector() {
			selectorGrid.innerHTML = '';
			allLetters.forEach(l => {
				const btn = document.createElement('button');
				btn.className = `p-3 rounded-2xl border-2 transition-all flex flex-col items-center ${l.active ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 bg-white text-gray-400'}`;
				btn.innerHTML = `<span class="text-lg font-bold serif-font">${l.char}</span>`;
				btn.onclick = () => {
					l.active = !l.active;
					btn.className = `p-3 rounded-2xl border-2 transition-all flex flex-col items-center ${l.active ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 bg-white text-gray-400'}`;
				};
				selectorGrid.appendChild(btn);
			});
		}

		function selectAll(val) {
			allLetters.forEach(l => l.active = val);
			setupSelector();
		}

		function toggleModal() {
			modal.classList.toggle('hidden');
			modal.classList.toggle('flex');
			if (!modal.classList.contains('hidden')) {
				setupSelector();
				document.getElementById('keyboard-toggle').checked = keyboardMode;
			}
		}

		function saveAndClose() {
			const activeCount = allLetters.filter(l => l.active).length;
			if (activeCount < 2) return;
			toggleModal();
			initGame();
		}

		function weightedRandomSelect() {
			const activePool = allLetters.filter(l => l.active);
			const totalWeight = activePool.reduce((sum, item) => sum + item.weight, 0);
			let random = Math.random() * totalWeight;

			for (const item of activePool) {
				if (random < item.weight) return item;
				random -= item.weight;
			}
			return activePool[0];
		}

		function triggerConfetti() {
			const duration = 5 * 1000;
			const animationEnd = Date.now() + duration;
			const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

			const interval = setInterval(function () {
				const timeLeft = animationEnd - Date.now();
				if (timeLeft <= 0) return clearInterval(interval);
				const particleCount = 50 * (timeLeft / duration);
				confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random() * 0.4, y: Math.random() - 0.2 } }));
				confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random() * 0.4 + 0.6, y: Math.random() - 0.2 } }));
			}, 250);

			scoreContainer.classList.add('celebrate-text', 'bg-pink-500', 'scale-110');
		}

		function initGame() {
			if (isProcessing) return;
			const activePool = allLetters.filter(l => l.active);

			if (keyboardMode) {
				gameMode = 'H_TO_L';
			} else {
				gameMode = Math.random() > 0.5 ? 'L_TO_H' : 'H_TO_L';
			}
			currentLetter = weightedRandomSelect();

			if (gameMode === 'L_TO_H') {
				modeTextEl.textContent = "Which sound matches?";
				const parts = currentLetter.char.split(' ');
				const displayChar = Math.random() < 0.5 ? parts[0] : parts[1];
				targetEl.textContent = displayChar;
				targetEl.classList.remove('hebrew-text');
				targetEl.classList.add('serif-font');
			} else {
				modeTextEl.textContent = keyboardMode ? "Type the letter!" : "Which letter is this?";
				targetEl.textContent = currentLetter.hebrew;
				targetEl.classList.add('hebrew-text');
				targetEl.classList.remove('serif-font');
			}

			const len = targetEl.textContent.length;
			targetEl.style.fontSize = len > 8 ? "3rem" : (len > 4 ? "4.5rem" : "7.5rem");

			optionsEl.innerHTML = '';

			if (keyboardMode) {
				const input = document.createElement('input');
				input.type = 'text';
				input.maxLength = 1;
				input.id = 'keyboard-input';
				input.className = 'serif-font text-5xl text-center w-24 h-20 border-4 border-indigo-300 rounded-2xl outline-none focus:border-indigo-500 uppercase mx-auto block bg-blue-50 text-indigo-700 font-bold';
				input.autocomplete = 'off';
				input.autocapitalize = 'off';
				input.addEventListener('input', handleKeyboardInput);
				optionsEl.className = 'flex justify-center';
				optionsEl.appendChild(input);
				setTimeout(() => input.focus(), 50);
			} else {
				optionsEl.className = 'grid grid-cols-2 gap-3';
				let pool = activePool.filter(l => l.id !== currentLetter.id);
				let distractors = [];
				const count = Math.min(pool.length, 5);
				for (let i = 0; i < count; i++) {
					const randIndex = Math.floor(Math.random() * pool.length);
					distractors.push(pool.splice(randIndex, 1)[0]);
				}

				const choices = [currentLetter, ...distractors].sort(() => Math.random() - 0.5);

				choices.forEach(choice => {
					const btn = document.createElement('button');
					btn.className = "card bg-blue-50 hover:bg-blue-100 border-2 border-blue-200 rounded-2xl py-3 px-1 font-bold text-blue-800 shadow-sm flex justify-center items-center min-h-[70px]";

					if (gameMode === 'L_TO_H') {
						btn.textContent = choice.hebrew;
						btn.classList.add('hebrew-text');
						btn.classList.add(choice.hebrew.length > 5 ? 'text-lg' : 'text-2xl');
					} else {
						const parts = choice.char.split(' ');
						const displayChar = Math.random() < 0.5 ? parts[0] : parts[1];
						btn.textContent = displayChar;
						btn.classList.add('serif-font', 'text-3xl');
					}

					btn.onclick = () => handleGuess(choice, btn);
					optionsEl.appendChild(btn);
				});
			}

			feedbackEl.classList.add('opacity-0');
		}

		function handleKeyboardInput(e) {
			const typed = e.target.value.toUpperCase();
			if (!typed) return;
			if (isProcessing) { e.target.value = ''; return; }
			isProcessing = true;

			const correctChar = currentLetter.char.split(' ')[0];
			const isCorrect = typed === correctChar;
			const input = e.target;

			if (isCorrect) {
				score += 1;
				currentLetter.successes++;
				currentLetter.weight = Math.max(2, currentLetter.weight - 3);
				input.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
				input.classList.remove('bg-blue-50', 'border-indigo-300');
				showFeedback("Correct! 🎉", "text-green-500");

				if (score >= 50 && !hasCelebrated) {
					hasCelebrated = true;
					triggerConfetti();
				}

				setTimeout(() => {
					isProcessing = false;
					initGame();
				}, 800);
			} else {
				score -= 10;
				currentLetter.failures++;
				currentLetter.weight += 10;
				input.classList.add('bg-red-100', 'border-red-500', 'text-red-700');
				input.classList.remove('bg-blue-50', 'border-indigo-300');
				showFeedback("-10 Points! 🔄", "text-red-500");

				setTimeout(() => {
					input.value = '';
					input.classList.remove('bg-red-100', 'border-red-500', 'text-red-700');
					input.classList.add('bg-blue-50', 'border-indigo-300');
					input.focus();
					isProcessing = false;
				}, 800);
			}

			scoreEl.textContent = score;
		}

		function handleGuess(choice, element) {
			if (isProcessing) return;
			isProcessing = true;


			const isCorrect = choice.id === currentLetter.id;

			if (isCorrect) {
				score += 1;
				currentLetter.successes++;
				currentLetter.weight = Math.max(2, currentLetter.weight - 3);
				element.classList.add('correct-anim');
				showFeedback("Correct! 🎉", "text-green-500");

				if (score >= 50 && !hasCelebrated) {
					hasCelebrated = true;
					triggerConfetti();
				}

				setTimeout(() => {
					isProcessing = false;
					initGame();
				}, 800);
			} else {
				// Incorrect guess: Penalty increased to 10 points
				score -= 10;
				currentLetter.failures++;
				currentLetter.weight += 10;
				element.classList.add('wrong-anim');

				// Show both letter and transliteration on the wrongly guessed button
				const letterText = choice.char;
				const hebrewText = choice.hebrew;
				element.innerHTML = `
					<div class="flex flex-col items-center justify-center -my-1">
						<span class="serif-font ${letterText.length > 5 ? 'text-xl' : 'text-2xl'}">${letterText}</span>
						<span class="hebrew-text ${hebrewText.length > 5 ? 'text-md' : 'text-lg'}">${hebrewText}</span>
					</div>`;
				element.classList.remove('text-3xl', 'text-2xl', 'text-lg', 'serif-font', 'hebrew-text');

				showFeedback("-10 Points! 🔄", "text-red-500");

				setTimeout(() => {
					element.classList.remove('wrong-anim');
					isProcessing = false;
				}, 800);
			}

			scoreEl.textContent = score;
		}

		function showFeedback(msg, colorClass) {
			feedbackEl.textContent = msg;
			feedbackEl.className = `mt-6 text-center text-xl opacity-100 transition-opacity font-bold ${colorClass}`;
		}

		const statsModal = document.getElementById('stats-modal');
		const statsContent = document.getElementById('stats-content');

		function toggleStatsModal() {
			statsModal.classList.toggle('hidden');
			statsModal.classList.toggle('flex');
			if (!statsModal.classList.contains('hidden')) renderStats();
		}

		function renderStats() {
			const played = allLetters.filter(l => l.successes > 0 || l.failures > 0);
			const unplayed = allLetters.filter(l => l.successes === 0 && l.failures === 0);

			const sorted = [...played].sort((a, b) => {
				const rateA = a.successes / (a.successes + a.failures);
				const rateB = b.successes / (b.successes + b.failures);
				return rateA - rateB;
			});

			const all = [...sorted, ...unplayed];

			statsContent.innerHTML = `
				<table class="w-full text-sm font-sans">
					<thead>
						<tr class="text-gray-500 border-b">
							<th class="text-left py-2 px-2">Letter</th>
							<th class="text-center py-2 px-2 text-green-600">Pass</th>
							<th class="text-center py-2 px-2 text-red-500">Fail</th>
							<th class="text-center py-2 px-2">Rate</th>
						</tr>
					</thead>
					<tbody>
						${all.map(l => {
							const total = l.successes + l.failures;
							const rate = total > 0 ? Math.round((l.successes / total) * 100) : null;
							const rateText = rate !== null ? rate + '%' : '-';
							const barColor = rate === null ? 'bg-gray-200' : rate >= 70 ? 'bg-green-400' : rate >= 40 ? 'bg-yellow-400' : 'bg-red-400';
							const barWidth = rate !== null ? rate : 0;
							return `
								<tr class="border-b last:border-0">
									<td class="py-2 px-2 serif-font font-bold text-indigo-700">${l.char.split(' ')[0]}</td>
									<td class="text-center py-2 px-2 text-green-600 font-bold">${l.successes}</td>
									<td class="text-center py-2 px-2 text-red-500 font-bold">${l.failures}</td>
									<td class="py-2 px-2 w-24">
										<div class="flex items-center gap-2">
											<div class="flex-1 bg-gray-100 rounded-full h-3 overflow-hidden">
												<div class="${barColor} h-full rounded-full" style="width:${barWidth}%"></div>
											</div>
											<span class="text-xs font-bold w-8 text-right">${rateText}</span>
										</div>
									</td>
								</tr>`;
						}).join('')}
					</tbody>
				</table>`;
		}

		window.onload = initGame;
	</script>
</body>

</html>
